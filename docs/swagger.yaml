info:
  contact: {}
  description: This is the backend API for my portfolio website.
  title: Portfolio Website API
  version: "1.0"
paths:
  /chatbot/sessions:
    get:
      consumes:
      - application/json
      description: Retrieve active chat sessions for the authenticated user
      parameters:
      - default: 50
        description: Limit number of sessions
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/portfolio-website-backend_internal_dto.ChatSessionResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Chat Sessions
      tags:
      - Chatbot
  /chatbot/sessions/{session_id}/messages:
    get:
      consumes:
      - application/json
      description: Retrieve the message history for a specific chat session
      parameters:
      - description: Session UUID
        format: uuid
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/portfolio-website-backend_internal_dto.ChatMessageResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Session Messages
      tags:
      - Chatbot
  /chatbot/sync:
    post:
      consumes:
      - application/json
      description: Triggers a manual refresh of the Vector Store for the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Sync Vector Context
      tags:
      - Chatbot
  /chatbot/ws/chat:
    get:
      description: Initiates a WebSocket connection for real-time portfolio chat.
        Requires session_id and user_id.
      parameters:
      - description: Client Chat Session UUID
        format: uuid
        in: query
        name: session_id
        required: true
        type: string
      - description: Portfolio Owner UUID
        format: uuid
        in: query
        name: user_id
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols to WebSockets
      summary: WebSocket Chat Endpoint
      tags:
      - Chatbot
  /experiences:
    get:
      consumes:
      - application/json
      description: Get a paginated list of experiences (requires auth)
      parameters:
      - description: Skip count
        in: query
        name: skip
        type: integer
      - description: Limit count
        in: query
        name: limit
        type: integer
      - description: Type (experience/education)
        in: query
