      description: Create a new experience or education entry
      parameters:
      - description: Experience Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/portfolio-website-backend_internal_models.Experience'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
