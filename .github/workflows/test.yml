name: Go Backend CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.6'

      - name: Install dependencies
        run: go mod download

      - name: Run User Domain Tests
        env:
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/portfolio_test?sslmode=disable"
          ADMIN_API_KEY: "secret"
        run: go test ./tests/... -v
